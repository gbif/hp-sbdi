---
layout: default
---

<h1>{{ page.title }}</h1>

<p class="preamble mt-5 mb-4">
  {{ page.description }}
</p>

{% if page.image %}
  <figure class="news-detail-image mb-8">
    <img src="/uploads/news/{{ page.image }}" alt="" aria-hidden="true">
    {% if page.image-attribution %}
      <figcaption>{{ page.image-attribution }}</figcaption>
    {% endif %}
  </figure>
{% endif %}

{{ content }}

<footer class="news-detail-footer">
  Published: {{ page.date | date: "%b %d, %Y" }}
</footer>
