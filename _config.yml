# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.
#
# If you need help with YAML syntax, here are some quick references for you: 
# https://learn-the-web.algonquindesign.ca/topics/markdown-yaml-cheat-sheet/#yaml
# https://learnxinyminutes.com/docs/yaml/
# You should also look at https://theme.hp.gbif-staging.org/documentation-intro for options
#
# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

title: Swedish Biodiversity Data Infrastructure
email: support@biodiversitydata.se
description: >-
  The Swedish Biodiversity Data Infrastructure (SBDI) is a national initiative
  to make biodiversity data available and accessible for research, education,
  and conservation.
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://sbdi.hp.gbif.org/" # the base hostname & protocol for your site, e.g. http://example.com

# SOCIAL PROFILES that will show in the footer
email: support@biodiversitydata.se                                      # Social icon in footer
#twitter_username: yourname # if you have an account you want to link to. Else comment this line out
github_username:  biodiversitydata-se # if you have an account you want to link to. Else comment this line out
#bluesky_username: yourname.org                            # Social icon in footer
youtube_url: "https://www.youtube.com/@sbdi-swedishbiodiversityda8763"                              # Social icon in footer
#facebook_username: yourname                             # Social icon in footer
#flickr_username: yourname                               # Social icon in footer
#instagram_username: yourname                              # Social icon in footer
#mastodon_url: https://something.goes/@here                # Social icon in footer
#linkedin_url: https://www.linkedin.com/company/yourname # Social icon in footer

# Build settings
theme: minima
plugins:
  - jekyll-feed
  - jekyll-remote-theme

remote_theme: gbif/jekyll-hp-base-theme

algae:
  rootLang: en
  # latestPostLimit: 2
  logo: /assets/images/1x1.png  # Logo in navbar, will be displayed with 28px height
  # logoAndTitle: false           # include the title next to the logo
  archive_permalink: /news/       # Permalink of page using archive.html layout, required when using post categories
  style:
    # square: false               # Should corners be square or rounded
    colors:
      primary: "#284966"          # Primary color of your brand. Use HEX code. Used for buttons and links
      # links: "#fa5e97"          # What color should links have. Use a HEX code. DEfault is primary color. 
    coloredHeadlineLinks: false   # If a headline is a link, then use the link color. Default is true. 
  navbar:                         # RELATED TO NAVIGATION BAR
    brandBackground: "#6691a4"     # Define a custom background for the logo/title in the top navigation bar
    color: "#6691a4"             # What color should the navbar be?
    hasWhiteText: true          # Should the text color be white?
    # floating: true

useSharedLibrary: true # Use the new component library
updateTranslationMenuOnWidgetEvents: true # Notice that this feature requires urls for widgets to be the same across languages (except for a language prefix)

# Exclude from processing.
# The following items will not be processed, by default.
# Any item listed under the `exclude:` key here will be automatically added to
# the internal "default list".
#
# Excluded items can be processed by explicitly listing the directories or
# their entries' file path in the `include:` list.
#
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - .LICENSE
  - .netlify.toml
  - serve.json
  - en/data/disabled/
  - README.md
  - /**/README.md  # exclude all README.md files in any folder
  - Makefile
  - docker-compose.yml
  - dev.Dockerfile

collections:
  courses:
    output: true
    sort_by: sort_order
    permalink: "/support/courses/:slug/"

permalink: pretty # will strip extensions like .html from urls

defaults:
  - scope:
      path: "" # an empty string here means all files in the project
    values:
      layout: "page" # So by default any page will use the layout "page"
      lang: en # And have the default language english
  - scope:
      path: "_posts" # an empty string here means all files in the project
    values:
      layout: "post"
      permalink: "/post/:year/:slug/"   # Use /post/yyyy/{filename}/ as permalink for all posts

  - scope:
      path: ""
      type: courses
    values:
      layout: course-item
